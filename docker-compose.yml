
# proyecto-05/docker-compose.yml
services:
  db-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Lima
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      - checkout-network
  api:
    build: .
    # build:
    #   context: .
    #   target: ${STAGE}
    #   dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: db-postgres  # OJO: Aquí usamos el nombre del servicio 'db'
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALG: ${JWT_ALG}
      JWT_EXPIRES_MIN: ${JWT_EXPIRES_MIN}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db-postgres
    networks:
      - checkout-network
  pg-admin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: America/Lima
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db-postgres
    networks:
      - checkout-network
volumes:
  postgres-db:
    # external: false

networks:
  checkout-network:
    driver: bridge